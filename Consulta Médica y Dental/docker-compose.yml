  mysql-reserva:
    image: mysql:8.0
    container_name: mysql-reserva
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_reservar_y_anular_hora
    ports:
      - "3317:3306"
    volumes:
      - mysql-reserva-data:/var/lib/mysql
    networks:
      - consulta-medica-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- INFRAESTRUCTURA ---

  ms-eureka:
    build: ./ms-eureka
    container_name: ms-eureka
    ports:
      - "8761:8761"
    networks:
      - consulta-medica-net

  ms-gateway:
    build: ./ms-gateway
    container_name: ms-gateway
    ports:
      - "8091:8091"
    environment:
      EUREKA_URL: http://ms-eureka:8761/eureka/
    depends_on:
      - ms-eureka
    networks:
      - consulta-medica-net

  # --- MICROSERVICIOS ---

  ms-auth:
    build: ./ms-auth
    container_name: ms-auth
    ports:
      - "8080:8080"
    environment:
      DB_HOST: mysql-auth
      DB_PORT: 3306
      DB_NAME: ms-user
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: clave_super_secreta_12345678901234567890
      EUREKA_URL: http://ms-eureka:8761/eureka/
    depends_on:
      mysql-auth:
        condition: service_healthy
      ms-eureka:
        condition: service_started
    networks:
      - consulta-medica-net

  ms-facturacion:
    build: ./ms-facturación y presupuesto
    container_name: ms-facturacion
    ports:
      - "8081:8081"
    environment:
      DB_HOST: mysql-facturacion
      DB_PORT: 3306
      DB_NAME: ms_facturacion_y_Presupuesto
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: clave_super_secreta_12345678901234567890
      EUREKA_URL: http://ms-eureka:8761/eureka/
    depends_on:
      mysql-facturacion:
        condition: service_healthy
      ms-eureka:
        condition: service_started
    networks:
      - consulta-medica-net

  ms-ficha-medica:
    build: ./ms-ficha medica
    container_name: ms-ficha-medica
    ports:
      - "8083:8083"
    environment:
      DB_HOST: mysql-ficha
      DB_PORT: 3306
      DB_NAME: ms_ficha_medica
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: clave_super_secreta_12345678901234567890
      EUREKA_URL: http://ms-eureka:8761/eureka/
