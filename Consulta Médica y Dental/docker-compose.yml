    container_name: mysql-atenciones
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_registros_de_atenciones
    ports:
      - "3315:3306"
    volumes:
      - mysql-atenciones-data:/var/lib/mysql
    networks:
      - consulta-medica-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-materiales:
    image: mysql:8.0
    container_name: mysql-materiales
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_registro_de_materiales
    ports:
      - "3316:3306"
    volumes:
      - mysql-materiales-data:/var/lib/mysql
