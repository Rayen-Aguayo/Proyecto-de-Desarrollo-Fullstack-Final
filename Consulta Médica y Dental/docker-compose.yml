      - consulta-medica-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-receta:
    image: mysql:8.0
    container_name: mysql-receta
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_receta_medica
