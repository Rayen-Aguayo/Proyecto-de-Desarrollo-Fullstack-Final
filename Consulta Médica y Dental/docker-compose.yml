      mysql-ficha:
        condition: service_healthy
      ms-eureka:
        condition: service_started
    networks:
      - consulta-medica-net

  ms-medico:
    build: ./ms-medico
    container_name: ms-medico
    ports:
      - "8082:8082"
    environment:
      DB_HOST: mysql-medico
      DB_PORT: 3306
      DB_NAME: ms_medico
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: clave_super_secreta_12345678901234567890
