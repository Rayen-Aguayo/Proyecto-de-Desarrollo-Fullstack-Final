    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-pagos:
    image: mysql:8.0
    container_name: mysql-pagos
    environment:
      MYSQL_ROOT_PASSWORD: root
