services:

  # --- BASES DE DATOS ---

  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms-user
    ports:
      - "3307:3306"
    volumes:
      - mysql-auth-data:/var/lib/mysql
    networks:
      - consulta-medica-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-facturacion:
    image: mysql:8.0
    container_name: mysql-facturacion
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ms_facturacion_y_Presupuesto
    ports:
      - "3308:3306"
    volumes:
      - mysql-facturacion-data:/var/lib/mysql
    networks:
      - consulta-medica-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-ficha:
    image: mysql:8.0
